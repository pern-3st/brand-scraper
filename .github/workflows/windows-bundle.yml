name: Windows bundle smoke test

on:
  pull_request:
    paths:
      - "windows/**"
      - "backend/pyproject.toml"
      - "frontend/package.json"
      - ".github/workflows/windows-bundle.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Pre-install uv and Node so setup.bat's `where uv` / `where node`
      # checks succeed and it skips the winget branch entirely.
      # winget on windows-latest is historically flaky for CI.
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Seed placeholder backend/.env
        shell: pwsh
        run: |
          "OPENROUTER_API_KEY=sk-or-dummy" | Out-File -Encoding ascii backend/.env
          "OPENROUTER_MODEL=x-ai/grok-4.1-fast" | Out-File -Encoding ascii -Append backend/.env

      - name: Run setup.bat
        shell: cmd
        # `< nul` skips the `pause` prompts.
        run: windows\setup.bat < nul

      - name: Assert setup marker exists
        shell: pwsh
        run: |
          if (-not (Test-Path "windows/.setup_complete")) { throw "setup did not complete" }

      - name: Launch run.bat in background and probe the app
        shell: pwsh
        timeout-minutes: 5
        run: |
          Start-Process -FilePath "cmd.exe" -ArgumentList "/c","windows\run.bat"
          $deadline = (Get-Date).AddMinutes(3)
          $ok = $false
          while ((Get-Date) -lt $deadline) {
            try {
              $r = Invoke-WebRequest -UseBasicParsing -Uri http://localhost:3000 -TimeoutSec 2
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch { Start-Sleep -Seconds 2 }
          }
          if (-not $ok) { throw "frontend never responded" }

      - name: Stop
        if: always()
        shell: cmd
        run: windows\stop.bat
